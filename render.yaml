services:
  - type: web
    name: cosmos-cqa-public-portal
    runtime: static
    repo: https://github.com/AI-Bio-Synergy-Holdings-LLC/COSMOS-CQA
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm --prefix apps/web ci && npm --prefix apps/web run pages:prepare
    staticPublishPath: apps/web/dist-pages
    domains:
      - cosmos-cqa.org
    headers:
      - path: /*
        name: Content-Security-Policy
        value: >-
          default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; upgrade-insecure-requests
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY

previews:
  generation: automatic
