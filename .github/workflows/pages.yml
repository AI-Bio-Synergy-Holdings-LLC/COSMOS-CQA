name: Deploy Public Portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Validate public portal deployment contract
        run: npm --prefix apps/web run check:portal-deploy

      - name: Prepare public portal artifact
        run: npm --prefix apps/web run pages:prepare

      - name: Smoke prepared Pages artifact
        shell: bash
        run: |
          COSMOS_CQA_STATIC_ROOT=apps/web/dist-pages node apps/web/scripts/serve.mjs &
          server_pid=$!
          trap "kill $server_pid" EXIT
          for attempt in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:4173/ >/dev/null; then
              break
            fi
            sleep 0.5
          done
          COSMOS_CQA_PORTAL_BASE_URL=http://127.0.0.1:4173 npm --prefix apps/web run check:portal-deploy

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist-pages

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy public portal
        id: deployment
        uses: actions/deploy-pages@v5

  verify:
    name: Verify deployed public portal
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Run post-deploy public portal checks
        shell: bash
        env:
          COSMOS_CQA_PORTAL_BASE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          if npm --prefix apps/web run pages:check-dns; then
            for attempt in {1..30}; do
              if curl --fail --silent --show-error "${COSMOS_CQA_PORTAL_BASE_URL}" >/dev/null; then
                break
              fi
              sleep 2
            done
            npm --prefix apps/web run check:portal-deploy
          else
            echo "::warning title=GitHub Pages DNS pending::cosmos-cqa.org is configured in Pages, but DNS does not yet resolve to GitHub Pages. Live post-deploy validation will run after the Squarespace DNS handoff completes."
          fi
