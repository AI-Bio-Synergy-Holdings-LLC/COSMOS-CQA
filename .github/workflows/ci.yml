name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"

permissions:
  contents: read

jobs:
  web-checks:
    name: Web checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Install Chromium for browser workflow tests
        run: npm --prefix apps/web exec -- playwright install --with-deps chromium

      - name: Run repository health, web source, contract, browser, and legacy checks
        run: npm --prefix apps/web run check

      - name: Check whitespace hygiene
        run: git diff --check

      - name: Validate public portal deployment surface
        shell: bash
        run: |
          node apps/web/scripts/serve.mjs &
          server_pid=$!
          trap "kill $server_pid" EXIT
          for attempt in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:4173/ >/dev/null; then
              break
            fi
            sleep 0.5
          done
          COSMOS_CQA_PORTAL_BASE_URL=http://127.0.0.1:4173 npm --prefix apps/web run check:portal-deploy
